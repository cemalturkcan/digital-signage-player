# Root workspace configuration
packages:
  - 'apps/*'
  - 'packages/*'

# Shared catalog for dependency versions
catalog:
  typescript: ^5.3.0
  '@types/node': ^20.10.0
  eslint: ^8.56.0
  vitest: ^1.2.0

# Strict peer dependencies
strict-peer-dependencies: false

# Workspace settings
prefer-workspace-packages: true
