services:
  reverse-proxy:
    image: traefik:3.6.9
    command:
      - --providers.swarm=true
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.main.acme.dnschallenge=true
      - --certificatesresolvers.main.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.main.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --certificatesresolvers.main.acme.dnschallenge.delaybeforecheck=20
      - --certificatesresolvers.main.acme.email=cemalturkcan@gmail.com
      - --certificatesresolvers.main.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
    ports:
      - mode: host
        protocol: tcp
        published: 80
        target: 80
      - mode: host
        protocol: tcp
        published: 443
        target: 443
    environment:
      - CF_DNS_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      placement:
        constraints:
          - node.role == manager

  postgres:
    image: postgres:18
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    command: >
      sh -c '
        pass="$${MQTT_PASSWORD}";
        test -n "$${pass}";

        if [ ! -f /mosquitto/config/dynamic-security.json ]; then
          mosquitto_ctrl dynsec init /mosquitto/config/dynamic-security.json admin "$${pass}";
        fi;

        mosquitto_ctrl -f /mosquitto/config/dynamic-security.json dynsec setClientPassword admin "$${pass}" >/dev/null 2>&1 || true;
        chown mosquitto:mosquitto /mosquitto/config/dynamic-security.json;
        chmod 640 /mosquitto/config/dynamic-security.json;

        printf "%s\n" \
          "listener 1883" \
          "protocol mqtt" \
          "listener 9001" \
          "protocol websockets" \
          "allow_anonymous false" \
          "plugin /usr/lib/mosquitto_dynamic_security.so" \
          "plugin_opt_config_file /mosquitto/config/dynamic-security.json" \
          "persistence true" \
          "persistence_location /mosquitto/data/" \
          "log_dest stdout" \
          > /mosquitto/config/mosquitto.conf

        mosquitto -c /mosquitto/config/mosquitto.conf &
        pid=$$!;

        until mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec getClient admin >/dev/null 2>&1; do
          sleep 1;
        done;

        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec createRole backend_dispatcher >/dev/null 2>&1 || true;
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec addRoleACL backend_dispatcher publishClientSend "#" allow >/dev/null 2>&1 || true;
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec addRoleACL backend_dispatcher publishClientReceive "#" allow >/dev/null 2>&1 || true;
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec addRoleACL backend_dispatcher subscribePattern "#" allow >/dev/null 2>&1 || true;
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec addRoleACL backend_dispatcher unsubscribePattern "#" allow >/dev/null 2>&1 || true;
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec addClientRole admin backend_dispatcher -1 >/dev/null 2>&1 || true;

        wait "$${pid}"
      '
    environment:
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    volumes:
      - mosquitto_config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.signage-mqtt.rule=Host(`signage.cemalturkcan.com`) && PathPrefix(`/mqtt`)
        - traefik.http.routers.signage-mqtt.entrypoints=websecure
        - traefik.http.routers.signage-mqtt.tls.certresolver=main
        - traefik.http.routers.signage-mqtt.priority=200
        - traefik.http.services.signage-mqtt.loadbalancer.server.port=9001

volumes:
  letsencrypt:
  postgres_data:
  mosquitto_config:
  mosquitto_data:
  mosquitto_log:
