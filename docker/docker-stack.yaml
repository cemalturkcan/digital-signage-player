services:
  reverse-proxy:
    image: traefik:3.6.9
    command:
      - --providers.docker
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.main.acme.dnschallenge=true
      - --certificatesresolvers.main.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.main.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --certificatesresolvers.main.acme.dnschallenge.delaybeforecheck=20
      - --certificatesresolvers.main.acme.email=${TRAEFIK_ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.main.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
    ports:
      - mode: host
        protocol: tcp
        published: 80
        target: 80
      - mode: host
        protocol: tcp
        published: 443
        target: 443
    environment:
      - CF_DNS_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
    volumes:
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      placement:
        constraints:
          - node.role == manager

  postgres:
    image: postgres:18
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    command: >
      sh -c '
        printf "listener 1883\nallow_anonymous true\n" > /mosquitto/config/mosquitto.conf &&
        mosquitto -c /mosquitto/config/mosquitto.conf
      '
    volumes:
      - mosquitto_config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ['CMD-SHELL', 'mosquitto_pub -h localhost -p 1883 -t healthcheck -m ok']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - HOST=${HOST:-0.0.0.0}
      - MQTT_PROTOCOL=${MQTT_PROTOCOL:-mqtt}
      - MQTT_HOST=${MQTT_HOST:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USERNAME=${MQTT_USERNAME:-admin}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-admin1234567}
      - MQTT_TOPIC_NAMESPACE=${MQTT_TOPIC_NAMESPACE:-players}
      - MQTT_CLIENT_HOST=${MQTT_CLIENT_HOST:-mosquitto}
      - MQTT_CLIENT_PORT=${MQTT_CLIENT_PORT:-9001}
      - MQTT_CLIENT_SSL=${MQTT_CLIENT_SSL:-false}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_PRETTY=${LOG_PRETTY:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3000/api/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: ${BACKEND_REPLICAS:-2}
      update_config:
        parallelism: 1
        delay: 20s
        failure_action: rollback
        order: start-first
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.http.routers.signage-backend.rule=Host(`${BACKEND_DOMAIN:-panel.example.com}`) && PathPrefix(`/api`)
        - traefik.http.routers.signage-backend.entrypoints=websecure
        - traefik.http.routers.signage-backend.tls.certresolver=main
        - traefik.http.services.signage-backend.loadbalancer.server.port=3000

volumes:
  letsencrypt:
  postgres_data:
  mosquitto_config:
  mosquitto_data:
  mosquitto_log:
