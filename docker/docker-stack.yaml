services:
  reverse-proxy:
    image: traefik:3.6.9
    command:
      - --providers.docker
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.main.acme.dnschallenge=true
      - --certificatesresolvers.main.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.main.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --certificatesresolvers.main.acme.dnschallenge.delaybeforecheck=20
      - --certificatesresolvers.main.acme.email=cemalturkcan@gmail.com
      - --certificatesresolvers.main.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
    ports:
      - mode: host
        protocol: tcp
        published: 80
        target: 80
      - mode: host
        protocol: tcp
        published: 443
        target: 443
    environment:
      - CF_DNS_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      placement:
        constraints:
          - node.role == manager

  postgres:
    image: postgres:18
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    command: >
      sh -c '
        pass="$${MQTT_PASSWORD}";
        test -n "$${pass}";

        if [ ! -f /mosquitto/config/dynamic-security.json ]; then
          mosquitto_ctrl dynsec init /mosquitto/config/dynamic-security.json admin "$${pass}";
        fi;

        cat > /mosquitto/config/mosquitto.conf <<EOF
        per_listener_settings true
        allow_anonymous false
        listener 1883
        protocol mqtt
        listener 9001
        protocol websockets
        plugin /usr/lib/mosquitto_dynamic_security.so
        plugin_opt_config_file /mosquitto/config/dynamic-security.json
        persistence true
        persistence_location /mosquitto/data/
        log_dest stdout
        EOF

        mosquitto -c /mosquitto/config/mosquitto.conf &
        pid=$$!;

        until mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec getClient admin >/dev/null 2>&1; do
          sleep 1;
        done;

        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec createRole backend_dispatcher >/dev/null 2>&1 || true;
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec addRoleACL backend_dispatcher publishClientSend "#" allow >/dev/null 2>&1 || true;
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec addRoleACL backend_dispatcher publishClientReceive "#" allow >/dev/null 2>&1 || true;
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec addRoleACL backend_dispatcher subscribePattern "#" allow >/dev/null 2>&1 || true;
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec addRoleACL backend_dispatcher unsubscribePattern "#" allow >/dev/null 2>&1 || true;
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$${pass}" dynsec addClientRole admin backend_dispatcher -1 >/dev/null 2>&1 || true;

        wait "$${pid}"
      '
    environment:
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    volumes:
      - mosquitto_config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.signage-mqtt.rule=Host(`signage.cemalturkcan.com`)
        - traefik.http.routers.signage-mqtt.entrypoints=websecure
        - traefik.http.routers.signage-mqtt.tls.certresolver=main
        - traefik.http.services.signage-mqtt.loadbalancer.server.port=9001
    healthcheck:
      test: ['CMD-SHELL', 'mosquitto_pub -h localhost -p 1883 -t healthcheck -m ok']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - MQTT_PROTOCOL=mqtt
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_TOPIC_NAMESPACE=players
      - MQTT_CLIENT_HOST=signage.cemalturkcan.com
      - MQTT_CLIENT_PORT=443
      - MQTT_CLIENT_SSL=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - LOG_LEVEL=info
      - LOG_PRETTY=false
      - CORS_ORIGINS=
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3000/api/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 20s
        failure_action: rollback
        order: start-first
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.http.routers.signage-backend.rule=Host(`signage.cemalturkcan.com`) && PathPrefix(`/api`)
        - traefik.http.routers.signage-backend.entrypoints=websecure
        - traefik.http.routers.signage-backend.tls.certresolver=main
        - traefik.http.services.signage-backend.loadbalancer.server.port=3000

volumes:
  letsencrypt:
  postgres_data:
  mosquitto_config:
  mosquitto_data:
  mosquitto_log:
