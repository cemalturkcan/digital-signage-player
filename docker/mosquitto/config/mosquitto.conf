# Mosquitto configuration for digital signage

# Default listener
listener 1883
protocol mqtt

# WebSocket listener
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type information

# Allow anonymous (for development)
allow_anonymous true

# TODO: Enable authentication for production
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/acl
