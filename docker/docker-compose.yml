services:
  postgres:
    image: postgres:18
    ports:
      - '${DB_PORT}:5432'
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./mosquitto/config:/mosquitto/config
    environment:
      - MOSQUITTO_DYNSEC_PASSWORD=${MQTT_DYNSEC_PASSWORD}
    command: >
      sh -c '
        mosquitto -c /mosquitto/config/mosquitto.conf &
        pid=$$!
        pass=$${MOSQUITTO_DYNSEC_PASSWORD}

        until mosquitto_ctrl -h localhost -p 1883 -u admin -P "$$pass" dynsec getClient admin >/dev/null 2>&1; do
          sleep 1
        done

        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$$pass" dynsec createRole backend_dispatcher >/dev/null 2>&1 || true
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$$pass" dynsec addRoleACL backend_dispatcher publishClientSend "#" allow >/dev/null 2>&1 || true
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$$pass" dynsec addRoleACL backend_dispatcher publishClientReceive "#" allow >/dev/null 2>&1 || true
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$$pass" dynsec addRoleACL backend_dispatcher subscribePattern "#" allow >/dev/null 2>&1 || true
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$$pass" dynsec addRoleACL backend_dispatcher unsubscribePattern "#" allow >/dev/null 2>&1 || true
        mosquitto_ctrl -h localhost -p 1883 -u admin -P "$$pass" dynsec addClientRole admin backend_dispatcher -1 >/dev/null 2>&1 || true

        wait "$$pid"
      '
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mosquitto_pub -h localhost -p 1883 -u admin -P $${MOSQUITTO_DYNSEC_PASSWORD} -t healthcheck -m ok',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    ports:
      - '${PORT}:${PORT}'
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - HOST=${HOST}
      - MQTT_PROTOCOL=${MQTT_PROTOCOL}
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
