name: Tizen Release

on:
  push:
    branches:
      - main
    paths:
      - 'apps/player/**'
      - 'packages/contracts/**'
      - 'packages/config/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/tizen-release.yml'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (example: v0.1.0). Empty uses player package version.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Tizen CLI
        id: tizen-cache
        uses: actions/cache@v4
        with:
          path: ~/tizen-studio
          key: tizen-cli-${{ runner.os }}-6.1

      - name: Install Tizen CLI
        if: steps.tizen-cache.outputs.cache-hit != 'true'
        env:
          TIZEN_STUDIO_VERSION: '6.1'
        run: |
          set -euo pipefail
          INSTALLER="web-cli_Tizen_Studio_${TIZEN_STUDIO_VERSION}_ubuntu-64.bin"
          INSTALLER_URL="https://download.tizen.org/sdk/Installer/tizen-studio_${TIZEN_STUDIO_VERSION}/${INSTALLER}"

          curl -fsSL -o "$RUNNER_TEMP/$INSTALLER" "$INSTALLER_URL"
          chmod +x "$RUNNER_TEMP/$INSTALLER"
          "$RUNNER_TEMP/$INSTALLER" --accept-license "$HOME/tizen-studio"

      - name: Add Tizen CLI to PATH
        run: |
          echo "$HOME/tizen-studio/tools/ide/bin" >> "$GITHUB_PATH"
          echo "$HOME/tizen-studio/tools" >> "$GITHUB_PATH"

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          PLAYER_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/player/package.json','utf8')).version")
          EVENT_NAME="${{ github.event_name }}"
          RELEASE_ENABLED=false
          TAG=""
          SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-8)"

          if [ "$EVENT_NAME" = "push" ] && [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            RELEASE_ENABLED=true
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            INPUT_TAG="${{ github.event.inputs.release_tag }}"
            if [ -n "$INPUT_TAG" ]; then
              TAG="$INPUT_TAG"
              RELEASE_ENABLED=true
            fi
          fi

          ARTIFACT_NAME="tizen-wgt-${SHORT_SHA}"

          echo "version=$PLAYER_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_enabled=$RELEASE_ENABLED" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "wgt_path=apps/player/digital_signage_player_${PLAYER_VERSION}.wgt" >> "$GITHUB_OUTPUT"

      - name: Prepare signing secrets
        env:
          TIZEN_AUTHOR_CERT_B64: ${{ secrets.TIZEN_AUTHOR_CERT_B64 }}
          TIZEN_AUTHOR_CERT_PASSWORD: ${{ secrets.TIZEN_AUTHOR_CERT_PASSWORD }}
          TIZEN_PROFILE: ${{ vars.TIZEN_PROFILE }}
          VITE_MQTT_TOPIC_NAMESPACE: ${{ vars.VITE_MQTT_TOPIC_NAMESPACE }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
        run: |
          set -euo pipefail

          if [ -z "${TIZEN_AUTHOR_CERT_B64:-}" ]; then
            echo "Missing secret: TIZEN_AUTHOR_CERT_B64"
            exit 1
          fi

          if [ -z "${TIZEN_AUTHOR_CERT_PASSWORD:-}" ]; then
            echo "Missing secret: TIZEN_AUTHOR_CERT_PASSWORD"
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/tizen"
          AUTHOR_CERT_PATH="$RUNNER_TEMP/tizen/author.p12"

          echo "$TIZEN_AUTHOR_CERT_B64" | base64 -d > "$AUTHOR_CERT_PATH"

          PROFILE_BASE="${TIZEN_PROFILE:-SignageProfile}"
          PROFILE_NAME="${PROFILE_BASE}_${SHORT_SHA}"
          TOPIC_NAMESPACE="${VITE_MQTT_TOPIC_NAMESPACE:-players}"

          cat > apps/player/.env.tizen <<EOF
          TIZEN_PROFILE="$PROFILE_NAME"
          TIZEN_AUTHOR_CERT_PATH="$AUTHOR_CERT_PATH"
          TIZEN_AUTHOR_CERT_PASSWORD="$TIZEN_AUTHOR_CERT_PASSWORD"
          VITE_RUNTIME_NAME=tizen
          VITE_MQTT_TOPIC_NAMESPACE="$TOPIC_NAMESPACE"
          EOF

      - name: Validate author certificate
        run: |
          set -euo pipefail
          openssl pkcs12 \
            -legacy \
            -in "$RUNNER_TEMP/tizen/author.p12" \
            -passin "pass:${{ secrets.TIZEN_AUTHOR_CERT_PASSWORD }}" \
            -nokeys -clcerts \
            -out /dev/null

      - name: Print signing diagnostics
        run: |
          set -euo pipefail
          tizen cli-config -l
          tizen security-profiles list

      - name: Build signed WGT
        run: |
          pnpm --filter @signage/contracts exec tsc -b --force
          pnpm --filter @signage/config exec tsc -b --force
          pnpm --filter @signage/player build

      - name: Prepare release assets
        id: assets
        run: |
          set -euo pipefail
          WGT_PATH="${{ steps.meta.outputs.wgt_path }}"
          SHORT_SHA="${{ steps.meta.outputs.short_sha }}"

          if [ ! -f "$WGT_PATH" ]; then
            echo "WGT file not found: $WGT_PATH"
            exit 1
          fi

          HASHED_WGT_PATH="apps/player/digital_signage_player_${SHORT_SHA}.wgt"
          cp "$WGT_PATH" "$HASHED_WGT_PATH"

          CHECKSUM_PATH="${HASHED_WGT_PATH}.sha256"
          sha256sum "$HASHED_WGT_PATH" > "$CHECKSUM_PATH"

          echo "hashed_wgt_path=$HASHED_WGT_PATH" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$CHECKSUM_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload Tizen CLI logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tizen-cli-logs-${{ steps.meta.outputs.short_sha }}
          path: ~/tizen-studio-data/cli/logs/**
          if-no-files-found: ignore

      - name: Print latest Tizen CLI log on failure
        if: failure()
        run: |
          set +e
          LOG_DIR="$HOME/tizen-studio-data/cli/logs"
          if [ ! -d "$LOG_DIR" ]; then
            echo "Tizen CLI log directory not found: $LOG_DIR"
            exit 0
          fi

          LATEST_LOG=$(ls -1t "$LOG_DIR" | head -n 1)
          if [ -z "$LATEST_LOG" ]; then
            echo "No Tizen CLI log file found"
            exit 0
          fi

          echo "Latest Tizen CLI log: $LOG_DIR/$LATEST_LOG"
          tail -n 300 "$LOG_DIR/$LATEST_LOG"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            ${{ steps.assets.outputs.hashed_wgt_path }}
            ${{ steps.assets.outputs.checksum_path }}
          if-no-files-found: error

      - name: Create GitHub release
        if: steps.meta.outputs.release_enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Tizen Player ${{ steps.meta.outputs.short_sha }}
          generate_release_notes: true
          files: |
            ${{ steps.assets.outputs.hashed_wgt_path }}
            ${{ steps.assets.outputs.checksum_path }}
