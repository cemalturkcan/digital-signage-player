name: Backend Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'packages/contracts/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'docker/docker-stack.yaml'
      - '.github/workflows/backend-pipeline.yml'
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        run: |
          set -euo pipefail
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REPO="ghcr.io/${OWNER_LOWER}/digital-signage-backend"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-8)"

          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_REPO}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish image metadata artifact
        run: |
          set -euo pipefail
          cat > backend-image.txt <<EOF
          image_repo=${{ steps.meta.outputs.image_repo }}
          image_tag=${{ steps.meta.outputs.image_tag }}
          digest=${{ steps.build.outputs.digest }}
          commit=${{ github.sha }}
          EOF

      - name: Upload image metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image-${{ steps.meta.outputs.short_sha }}
          path: backend-image.txt

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push-image
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          set -euo pipefail
          cat > ./envfile <<EOF
          BACKEND_IMAGE=${{ needs.build-and-push-image.outputs.image_tag }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          MQTT_USERNAME=${{ secrets.MQTT_USERNAME }}
          MQTT_PASSWORD=${{ secrets.MQTT_PASSWORD }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
          EOF

      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' '${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}' > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          ssh-keyscan -H '${{ secrets.DEPLOY_HOST }}' >> "$HOME/.ssh/known_hosts"

      - name: Configure remote Docker context
        run: |
          set -euo pipefail
          docker context rm remote || true
          docker context create remote --docker "host=ssh://${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          docker --context remote version

      - name: Log in to GHCR for deploy
        run: |
          set -euo pipefail
          echo '${{ github.token }}' | docker login ghcr.io -u '${{ github.repository_owner }}' --password-stdin

      - name: Deploy Docker stack
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./envfile
          set +a
          docker --context remote stack deploy --compose-file docker/docker-stack.yaml --with-registry-auth --prune digital-signage
